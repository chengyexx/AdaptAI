<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 小说转剧本工具</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script defer src="https://unpkg.com/alpinejs@3.13.5/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <main class="landing">
        <h1>📖 AI 小说转剧本工具</h1>
        <p class="subtitle">将小说文本自动转换为结构化 YAML 剧本，支持人机协同编辑</p>

        <div class="input-section" x-data="{ mode: 'paste' }">
            <div class="mode-tabs">
                <button @click="mode = 'paste'" :class="{ active: mode === 'paste' }">
                    粘贴文本
                </button>
                <button @click="mode = 'upload'" :class="{ active: mode === 'upload' }">
                    上传文件 (.txt / .md / .docx)
                </button>
            </div>

            <!-- 粘贴模式 -->
            <div x-show="mode === 'paste'" class="paste-area">
                <textarea
                    id="novel-text"
                    placeholder="在此粘贴小说文本...&#10;&#10;支持自动识别章节分隔标记，如：&#10;## 第一章&#10;第1章&#10;Chapter 1"
                    rows="15"
                ></textarea>
                <div class="char-count">
                    已输入 <span id="char-count">0</span> 字符 |
                    最少需要 3 个章节才能生成完整剧本
                </div>
            </div>

            <!-- 上传模式 -->
            <div x-show="mode === 'upload'" class="upload-area">
                <input type="file" id="file-input" accept=".txt,.md,.docx" />
                <label for="file-input" class="upload-label">
                    <span>点击选择文件或拖拽到此处</span>
                    <span class="upload-hint">支持 .txt / .md / .docx</span>
                </label>
            </div>

            <button class="btn-primary" id="start-btn" disabled>
                开始转换 →
            </button>
        </div>
    </main>

    <script src="/static/js/state.js"></script>
</body>
</html>
