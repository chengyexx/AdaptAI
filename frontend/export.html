<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导出 — AI 小说转剧本</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="export-page">
        <h2>剧本导出</h2>
        <div class="export-actions">
            <button class="btn-primary" id="btn-download">下载 YAML</button>
            <button class="btn-secondary" id="btn-copy">复制到剪贴板</button>
            <a href="/static/workspace.html" class="btn-link" id="btn-back">返回工作台</a>
        </div>
        <pre id="export-preview"></pre>
    </div>
    <script src="/static/js/state.js"></script>
    <script>
    (async function() {
        const tid = new URLSearchParams(window.location.search).get('tid');
        if (!tid) return;
        AppState.threadId = tid;

        try {
            const resp = await fetch('/api/sessions/' + tid + '/export');
            if (resp.ok) {
                const yaml = await resp.text();
                document.getElementById('export-preview').textContent = yaml;
                document.getElementById('btn-download').onclick = () => {
                    const blob = new Blob([yaml], { type: 'text/yaml' });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = 'screenplay.yaml';
                    a.click();
                };
                document.getElementById('btn-copy').onclick = () => {
                    navigator.clipboard.writeText(yaml).then(() => alert('已复制！'));
                };
            }
        } catch(e) {}
        document.getElementById('btn-back').href += '?tid=' + tid;
    })();
    </script>
</body>
</html>
